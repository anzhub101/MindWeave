version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mindweave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindweave
      POSTGRES_USER: mindweave
      POSTGRES_PASSWORD: mindweave
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

